<!DOCTYPE html>
<html>
    

<head>

    <title>Smart Logistics Login</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body class="login-page">

    <div class="login-overlay">

        <div class="login-card">

            <img
                src="{{ url_for('static', filename='images/logo.png') }}"
                class="login-logo">

           <h1>Smart Logistics</h1>

<p>Admin Portal</p>

{% if error %}

<p style="color:red;
          margin-bottom:15px;
          font-weight:600;">

    {{ error }}

</p>

{% endif %}

            <form method="POST" action="/login">

                <input
                    type="text"
                    name="username"
                    placeholder="Username"
                    required>

                <input
                    type="password"
                    name="password"
                    placeholder="Password"
                    required>

                <button type="submit">
                    Sign In
                </button>

            </form>
            <div class="register-link">

    <p>
        Don't have an account?
    </p>

    <a href="/register">
        Create Account
    </a>

</div>

        </div>

    </div>

</body>

</html>
